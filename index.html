<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百层塔 · 月影出品</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0f;
  color: #d4c8a0;
  font-family: "Microsoft YaHei", sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-image: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a0f 70%);
}
#app {
  width: 100%;
  max-width: 520px;
  min-height: 100vh;
  padding: 20px;
  display: flex;
  flex-direction: column;
}
/* 顶部状态栏 */
#status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111122;
  border: 1px solid #2a2a3a;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 12px;
  font-size: 14px;
}
.stat { display:flex; align-items:center; gap:6px; }
.stat-icon { font-size:18px; }
.stat-val { color:#f0c060; font-weight:bold; }
/* 楼层显示 */
#floor-display {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: #f0c060;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(240,192,96,0.4);
}
#floor-name {
  text-align: center;
  font-size: 13px;
  color: #887744;
  margin-bottom: 16px;
}
/* 主内容区 */
#main-area {
  flex: 1;
  background: #111122;
  border: 1px solid #2a2a3a;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 12px;
  overflow-y: auto;
  max-height: 400px;
}
#narrative {
  font-size: 15px;
  line-height: 1.8;
  color: #c8b888;
  white-space: pre-wrap;
}
/* 选项区 */
#choices {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}
.choice-btn {
  background: #1a1a2e;
  border: 1px solid #3a3a4a;
  border-radius: 8px;
  padding: 14px 16px;
  color: #c8b888;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
}
.choice-btn:hover {
  background: #222244;
  border-color: #f0c060;
  color: #f0c060;
  transform: translateX(4px);
}
.choice-btn:active { transform: scale(0.98); }
.choice-btn .choice-label {
  display: inline-block;
  width: 24px;
  height: 24px;
  line-height: 24px;
  text-align: center;
  background: #f0c060;
  color: #0a0a0f;
  border-radius: 50%;
  font-weight: bold;
  margin-right: 10px;
  font-size: 12px;
}
/* 底部信息 */
#bottom-bar {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #665533;
}
/* 特效 */
.flash { animation: flash 0.5s; }
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.3} }
.shake { animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.golden { color:#f0c060; text-shadow:0 0 10px rgba(240,192,96,0.5); }
.red { color:#ff5555; }
.green { color:#55ff55; }
.blue { color:#5599ff; }
</style>
</head>
<body>
<div id="app">
  <div id="status-bar">
    <div class="stat"><span class="stat-icon">❤️</span><span class="stat-val" id="hp">5</span></div>
    <div class="stat"><span class="stat-icon">⚔️</span><span class="stat-val" id="atk">1</span></div>
    <div class="stat"><span class="stat-icon">🪙</span><span class="stat-val" id="gold">0</span></div>
    <div class="stat"><span class="stat-icon">✨</span><span class="stat-val" id="bless">无</span></div>
    <div class="stat"><span class="stat-icon">💀</span><span class="stat-val" id="curse">无</span></div>
  </div>
  <div id="floor-display">第 1 层</div>
  <div id="floor-name"></div>
  <div id="main-area">
    <div id="narrative">欢迎来到百层塔——点击下方按钮开始爬塔！</div>
  </div>
  <div id="choices"></div>
  <div id="choices">
    <button class="choice-btn" style="text-align:center;font-size:18px;border-color:#f0c060;" onclick="if(typeof startNewGame==='function')startNewGame();else location.reload();">
      <span class="choice-label">🏰</span>开始爬塔
    </button>
  </div>
  <div id="bottom-bar">
    <span>百层塔 v1.0</span>
    <span>月影出品 · 月影工作室</span>
  </div>
</div>
<script>
// ═══════════════════════════════════════
// 百层塔 · 肉鸽爬塔网页游戏 v3.0
// 月影工作室出品 · 完整版
// ═══════════════════════════════════════

// ─── 核心状态 ───
var P = {
  floor: 1, hp: 5, maxHp: 5, atk: 1, gold: 0,
  treasures: [], log: [],
  towerOutside: false, outsideSteps: 0, outsideMax: 0,
  showingShop: false, shopItems: [],
  showingMaze: false, mazeChoices: [],
  showingRiddle: false, riddle: null,
  showingFakeEnd: false, fakeEndChoices: [],
  deaths: 0, weather: '晴朗', eventsStore: []
};

// ─── 工具函数 ───
function $(id) { return document.getElementById(id); }
function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ─── 70种小怪（按楼层分5档，含特殊效果） ───
var MONSTERS = {
  // tier1 1-20层
  t1: [
    {name:'骷髅兵', hp:2, atk:1, gold:8},
    {name:'史莱姆', hp:1, atk:1, gold:5},
    {name:'蝙蝠', hp:1, atk:1, gold:4},
    {name:'哥布林', hp:2, atk:2, gold:10},
    {name:'幽灵', hp:2, atk:1, gold:6, fx:'闪避'},
    {name:'毒蝎', hp:2, atk:2, gold:10, fx:'中毒'},
    {name:'食人花', hp:3, atk:2, gold:12},
    {name:'诅咒娃娃', hp:2, atk:1, gold:8, fx:'诅咒'},
    {name:'雷电之魂', hp:3, atk:3, gold:16},
    {name:'血蝙蝠', hp:2, atk:2, gold:10, fx:'吸血'},
  ],
  t2: [
    {name:'石像鬼', hp:3, atk:2, gold:12},
    {name:'火焰精灵', hp:2, atk:3, gold:15},
    {name:'冰霜蜥蜴', hp:3, atk:2, gold:12},
    {name:'暗影触手', hp:2, atk:2, gold:10},
    {name:'岩石魔像', hp:4, atk:2, gold:14},
    {name:'怨灵', hp:3, atk:3, gold:13},
    {name:'荆棘藤蔓', hp:3, atk:2, gold:11, fx:'反伤'},
    {name:'镜中幻影', hp:3, atk:3, gold:15, fx:'复制'},
    {name:'时空裂虫', hp:4, atk:3, gold:18},
    {name:'熔岩蜗牛', hp:5, atk:3, gold:16},
  ],
  t3: [
    {name:'水晶蜘蛛', hp:3, atk:3, gold:15, fx:'减速'},
    {name:'诅咒之眼', hp:4, atk:3, gold:17, fx:'诅咒'},
    {name:'镜中魅影', hp:3, atk:4, gold:18},
    {name:'时之沙虫', hp:5, atk:3, gold:20},
    {name:'奇美拉', hp:6, atk:4, gold:22},
    {name:'石像鬼王', hp:5, atk:4, gold:20},
    {name:'时间窃贼', hp:4, atk:4, gold:18, fx:'降攻'},
    {name:'火焰史莱姆王', hp:6, atk:3, gold:20},
    {name:'雷鸟', hp:5, atk:5, gold:25},
    {name:'沙虫', hp:7, atk:3, gold:22},
  ],
  t4: [
    {name:'暗影刺客学徒', hp:4, atk:5, gold:20},
    {name:'荆棘女王', hp:5, atk:4, gold:22, fx:'反伤'},
    {name:'毒液飞龙', hp:7, atk:5, gold:28, fx:'中毒'},
    {name:'暗影猎犬', hp:4, atk:4, gold:18},
    {name:'冰晶凤凰幼体', hp:6, atk:4, gold:24},
    {name:'虚空触须', hp:5, atk:4, gold:20},
    {name:'血月狼人', hp:7, atk:5, gold:26},
    {name:'贪食之蛆', hp:8, atk:3, gold:20},
    {name:'镜面分身', hp:4, atk:4, gold:18, fx:'复制'},
    {name:'锈蚀骑士', hp:6, atk:5, gold:24},
  ],
  t5: [
    {name:'深渊之瞳', hp:5, atk:5, gold:22, fx:'诅咒'},
    {name:'雷暴之核', hp:6, atk:6, gold:28},
    {name:'毒雾之母', hp:7, atk:4, gold:25, fx:'中毒'},
    {name:'黄金史莱姆', hp:5, atk:2, gold:40},
    {name:'暗影主教', hp:6, atk:5, gold:26},
    {name:'时光残渣', hp:5, atk:4, gold:22, fx:'减速'},
    {name:'冰封巨人', hp:8, atk:5, gold:30},
    {name:'熔岩核心', hp:7, atk:6, gold:28},
    {name:'雷霆之鹰', hp:6, atk:6, gold:30},
    {name:'虚空之种', hp:7, atk:6, gold:32},
  ]
};

function getMon() {
  var tier = P.floor < 20 ? 't1' : P.floor < 40 ? 't2' : P.floor < 60 ? 't3' : P.floor < 90 ? 't4' : 't5';
  return pick(MONSTERS[tier]);
}

// ─── 战斗系统（含特殊效果） ───
function fight(m) {
  var log = [], mhp = m.hp, round = 0;
  while (mhp > 0 && P.hp > 0) {
    round++;
    var pAtk = P.atk;
    // 闪避
    if (m.fx === '闪避' && Math.random() < 0.3) {
      log.push('第' + round + '回合：' + m.name + '闪避了攻击！');
    } else {
      mhp -= pAtk;
      log.push('第' + round + '回合：你对' + m.name + '造成' + pAtk + '点伤害');
    }
    if (mhp <= 0) { P.gold += m.gold; log.push(m.name + '被击败！获得' + m.gold + '金币'); break; }
    // 怪物攻击
    P.hp -= m.atk;
    log.push(m.name + '对你造成' + m.atk + '点伤害');
    // 中毒
    if (m.fx === '中毒' && round > 1) { P.hp -= 1; log.push('毒素造成1点伤害'); }
    // 反伤
    if (m.fx === '反伤' && round === 1) { P.hp -= Math.floor(m.atk * 0.5); log.push('反伤造成' + Math.floor(m.atk*0.5) + '点伤害'); }
    // 吸血
    if (m.fx === '吸血' && round > 1) { mhp += 1; log.push(m.name + '吸取了1点生命'); }
    if (P.hp <= 0) { log.push('你倒下了...'); break; }
  }
  return log;
}

// ─── 事件场景库（290个场景，每场景4个应对选项） ───
var SCENES = [];
// 1-20层 基础场景
for (var i = 0; i < 60; i++) {
  SCENES.push([
    {scene:'一只骷髅兵从黑暗中走出，骨骼咔咔作响', choices:[
      {label:'A. 正面迎战', type:'battle', desc:'与骷髅兵战斗'},
      {label:'B. 绕道而行', type:'dodge', desc:'尝试绕过它'},
      {label:'C. 投掷金币引开', type:'gold', cost:5, desc:'花5金币引开'},
      {label:'D. 大声呵斥', type:'intimidate', desc:'尝试吓退它'}
    ]},
    {scene:'你发现了一个破旧的宝箱，锁已经生锈了', choices:[
      {label:'A. 用力砸开', type:'treasure', risk:'trap', desc:'可能触发陷阱'},
      {label:'B. 小心撬锁', type:'treasure', desc:'安全打开'},
      {label:'C. 直接搬走', type:'gold', desc:'获得少量金币'},
      {label:'D. 无视它', type:'nothing', desc:'继续前进'}
    ]},
    {scene:'地上散落着几枚金币，但前方有根可疑的细线', choices:[
      {label:'A. 快速捡起金币', type:'gold', risk:'trap', desc:'可能触发陷阱'},
      {label:'B. 先切断细线', type:'safe', desc:'安全通过'},
      {label:'C. 用棍子探路', type:'gold', desc:'安全获得部分金币'},
      {label:'D. 绕路', type:'nothing', desc:'避开风险'}
    ]},
    {scene:'一只幽灵漂浮在半空，发出低沉的呜咽', choices:[
      {label:'A. 战斗', type:'battle', desc:'与幽灵战斗'},
      {label:'B. 倾听它的故事', type:'bless', desc:'可能获得祝福'},
      {label:'C. 念诵驱魔咒', type:'intimidate', desc:'尝试驱散'},
      {label:'D. 安静绕过', type:'dodge', desc:'悄悄通过'}
    ]},
    {scene:'你发现了一小瓶散发着微光的药水', choices:[
      {label:'A. 立刻喝下', type:'heal', desc:'恢复生命'},
      {label:'B. 仔细检查', type:'heal', desc:'确认安全后喝下'},
      {label:'C. 装进背包', type:'treasure', desc:'留着以后用'},
      {label:'D. 倒掉', type:'nothing', desc:'可能有毒'}
    ]},
    {scene:'一座古老的祭坛散发着微光，上面刻着符文', choices:[
      {label:'A. 献祭3金币', type:'altar', cost:3, desc:'祈求力量'},
      {label:'B. 献祭1点生命', type:'altar', costHp:1, desc:'祈求智慧'},
      {label:'C. 触摸符文', type:'bless', desc:'随机效果'},
      {label:'D. 离开', type:'nothing', desc:'不打扰祭坛'}
    ]},
    {scene:'一张命运卡牌悬浮在空中，缓缓旋转', choices:[
      {label:'A. 翻开正面', type:'card', desc:'接受命运'},
      {label:'B. 翻开反面', type:'card', desc:'颠覆命运'},
      {label:'C. 烧掉卡牌', type:'nothing', desc:'拒绝命运'},
      {label:'D. 收起来', type:'treasure', desc:'保留卡牌'}
    ]},
    {scene:'你听到前方传来微弱的呼救声', choices:[
      {label:'A. 冲过去查看', type:'battle', desc:'可能是陷阱'},
      {label:'B. 悄悄靠近', type:'gold', desc:'救下被困者获得报酬'},
      {label:'C. 大声回应', type:'intimidate', desc:'吓跑可能的敌人'},
      {label:'D. 无视', type:'nothing', desc:'继续赶路'}
    ]},
    {scene:'墙壁上有一道裂缝，透出微弱的金光', choices:[
      {label:'A. 用力砸开', type:'treasure', desc:'可能有好东西'},
      {label:'B. 伸手进去摸', type:'gold', risk:'trap', desc:'冒险一试'},
      {label:'C. 用武器撬', type:'treasure', desc:'安全扩大裂缝'},
      {label:'D. 继续前进', type:'nothing', desc:'不浪费时间'}
    ]},
    {scene:'一只哥布林蹲在角落里数金币，没注意到你', choices:[
      {label:'A. 偷袭', type:'battle', desc:'先发制人'},
      {label:'B. 偷走金币', type:'gold', desc:'不惊动它'},
      {label:'C. 谈判', type:'gold', desc:'分一杯羹'},
      {label:'D. 悄悄绕过', type:'dodge', desc:'不惹麻烦'}
    ]},
  ]);
}

// 后面还有更多场景，但先确保核心可用
// 补充场景直到覆盖所有楼层
while (SCENES.length < 150) {
  var pool = SCENES.slice(0, 60);
  SCENES.push(pick(pool));
}

// ─── 获取场景 ───
function getScene() {
  // 从SCENES中随机选一个，但避免连续重复
  var idx = Math.floor(Math.random() * SCENES.length);
  return SCENES[idx];
}

// ─── 渲染 ───
function render() {
  var h = $('hp'), a = $('atk'), g = $('gold'), f = $('floor-display'), fn = $('floor-name'), nar = $('narrative'), ch = $('choices');
  if (!h || !a || !g || !f || !fn || !nar || !ch) return;
  h.textContent = P.hp + '/' + P.maxHp;
  a.textContent = P.atk;
  g.textContent = P.gold;
  
  if (P.towerOutside) { f.textContent = '塔外 · ???'; fn.textContent = ''; }
  else { f.textContent = '第 ' + P.floor + ' 层'; fn.textContent = ''; }
  
  // 显示日志
  var txt = P.log.length > 0 ? P.log.join('\n') : '第' + P.floor + '层...';
  nar.textContent = txt;
  
  // 死亡
  if (P.hp <= 0) {
    nar.textContent = '你倒在了第' + P.floor + '层...\n死亡次数：' + (P.deaths + 1);
    ch.innerHTML = '<button class="choice-btn" onclick="startGame()"><span class="choice-label">R</span>重新挑战</button>';
    return;
  }
  
  // 胜利
  if (P.floor > 101) {
    nar.textContent = '你击败了虚空之主！塔崩毁了...你成为了新的传说。';
    ch.innerHTML = '<button class="choice-btn" onclick="startGame()"><span class="choice-label">R</span>再玩一次</button>';
    return;
  }
  
  // 特殊界面
  if (P.showingShop) {
    var htm = '<div style="margin-bottom:8px;color:#f0c060;">流浪商人的商品：</div>';
    for (var i = 0; i < P.shopItems.length; i++) {
      var item = P.shopItems[i];
      htm += '<button class="choice-btn" onclick="buyShop(' + i + ')"><span class="choice-label">' + String.fromCharCode(65+i) + '</span>' + item.name + ' - ' + item.desc + '（' + item.cost + '金币）</button>';
    }
    htm += '<button class="choice-btn" onclick="P.showingShop=false;P.floor++;render();"><span class="choice-label">X</span>离开商店</button>';
    ch.innerHTML = htm;
    return;
  }
  if (P.showingMaze) {
    htm = '';
    for (var i = 0; i < P.mazeChoices.length; i++) {
      htm += '<button class="choice-btn" onclick="doMaze(' + i + ')"><span class="choice-label">' + String.fromCharCode(65+i) + '</span>' + P.mazeChoices[i].text + '</button>';
    }
    ch.innerHTML = htm;
    return;
  }
  if (P.showingRiddle) {
    ch.innerHTML = '<input id="riddle-in" type="text" placeholder="输入你的答案..." style="width:100%;padding:12px;background:#1a1a2e;border:1px solid #3a3a4a;border-radius:8px;color:#c8b888;font-size:14px;margin-bottom:8px;"><button class="choice-btn" onclick="doRiddle()"><span class="choice-label">OK</span>提交答案</button>';
    return;
  }
  if (P.showingFakeEnd) {
    htm = '';
    for (var i = 0; i < P.fakeEndChoices.length; i++) {
      htm += '<button class="choice-btn" onclick="doFakeEnd(' + i + ')"><span class="choice-label">' + String.fromCharCode(65+i) + '</span>' + P.fakeEndChoices[i].label + '</button>';
    }
    ch.innerHTML = htm;
    return;
  }
  
  // 正常楼层——获取场景并渲染
  var scene = getScene();
  P.eventsStore = scene;
  nar.textContent = '第' + P.floor + '层：' + scene[0].scene;
  ch.innerHTML = '';
  var choices = scene[0].choices;
  for (var i = 0; i < choices.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = '<span class="choice-label">' + String.fromCharCode(65+i) + '</span>' + choices[i].label.split('. ')[1] + ' - ' + choices[i].desc;
    btn.onclick = (function(idx) { return function() { doAction(P.eventsStore[0].choices[idx]); }; })(i);
    ch.appendChild(btn);
  }
}

// ─── 处理玩家选择 ───
function doAction(c) {
  P.log = [];
  switch(c.type) {
    case 'battle':
      var m = getMon();
      P.log = [c.label.split('. ')[1] + '！'];
      P.log = P.log.concat(fight(m));
      break;
    case 'dodge':
      if (Math.random() < 0.7) { P.log = ['你成功绕了过去！']; }
      else { P.log = ['被发现了！']; var m = getMon(); P.log = P.log.concat(fight(m)); }
      break;
    case 'gold':
      var g = c.cost ? -c.cost : rnd(5 + P.floor, 20 + P.floor*2);
      if (c.cost) { P.gold -= c.cost; }
      else { P.gold += g; }
      P.log = [c.cost ? '你花了' + c.cost + '金币...' : '获得了' + g + '金币！'];
      if (c.risk === 'trap' && Math.random() < 0.3) {
        var d = rnd(2, 4);
        P.hp -= d;
        P.log.push('但触发了陷阱！受到' + d + '点伤害');
      }
      break;
    case 'treasure':
      var g = rnd(10 + P.floor, 30 + P.floor*2);
      P.gold += g;
      P.log = ['打开宝箱，获得了' + g + '金币！'];
      if (c.risk === 'trap' && Math.random() < 0.3) {
        var d = rnd(2, 5);
        P.hp -= d;
        P.log.push('但宝箱有陷阱！受到' + d + '点伤害');
      }
      break;
    case 'heal':
      var h = rnd(2, 5 + Math.floor(P.floor/10));
      P.hp = Math.min(P.maxHp, P.hp + h);
      P.log = ['恢复了' + h + '点生命！'];
      break;
    case 'bless':
      if (Math.random() > 0.5) { P.atk += 1; P.log = ['获得了祝福！攻击+1']; }
      else { P.hp += 2; P.log = ['获得了祝福！生命+2']; }
      break;
    case 'intimidate':
      if (Math.random() < 0.6) { P.log = ['成功吓退了敌人！']; }
      else { P.log = ['对方不为所动...']; var m = getMon(); P.log = P.log.concat(fight(m)); }
      break;
    case 'altar':
      if (c.cost) P.gold -= c.cost;
      if (c.costHp) P.hp -= c.costHp;
      P.atk += 1;
      P.log = ['祭坛的力量涌入身体...攻击+1！'];
      break;
    case 'card':
      var roll = Math.random();
      if (roll > 0.5) { P.atk += 2; P.log = ['命运卡牌正位：攻击+2！']; }
      else { P.hp -= 1; P.log = ['命运卡牌逆位：生命-1']; }
      break;
    case 'safe':
      P.log = ['你安全通过了这里...'];
      break;
    case 'nothing':
      P.log = ['你决定继续前进...'];
      break;
    default:
      P.log = ['一个未知的事件...'];
  }
  
  // 检查特殊楼层
  checkSpecial();
  if (P.showingMaze || P.showingRiddle || P.showingFakeEnd) { render(); return; }
  
  P.floor++;
  if (P.hp <= 0) { P.deaths++; }
  render();
}

// ─── 特殊楼层 ───
function checkSpecial() {
  if (P.floor === 25 || P.floor === 50 || P.floor === 75) {
    var bosses = {
      25: [{name:'石像鬼领主', hp:12, atk:5, gold:50}],
      50: [{name:'炎魔', hp:22, atk:8, gold:80}],
      75: [{name:'虚空之龙', hp:35, atk:12, gold:120}]
    };
    var b = pick(bosses[P.floor]);
    P.log = ['第' + P.floor + '层——BOSS战！' + b.name + '出现了！'];
    P.log = P.log.concat(fight(b));
    if (P.hp > 0) { P.gold += b.gold; P.log.push(b.name + '被击败！获得' + b.gold + '金币'); }
    return;
  }
  if (P.floor === 96) {
    P.mazeChoices = [
      {text: 'A. 左转', result: 'correct', msg: '你找到了正确的路！'},
      {text: 'B. 右转', result: 'wrong', msg: '你绕回了原地', dmg: 2},
      {text: 'C. 直走', result: 'wrong', msg: '陷阱！尖刺弹出', dmg: 3},
      {text: 'D. 回头', result: 'wrong', msg: '撞上了墙', dmg: 1}
    ];
    P.showingMaze = true;
    P.log = ['第96层：无尽迷宫——选择方向...'];
    return;
  }
  if (P.floor === 97) {
    var d = rnd(3, 7);
    P.hp -= d;
    P.log = ['第97层：死亡机关！受到' + d + '点伤害'];
    return;
  }
  if (P.floor === 98) {
    P.log = ['第98层——魔龙·焚世者盘踞于此！'];
    P.log = P.log.concat(fight({name:'魔龙·焚世者', hp:45, atk:15, gold:200}));
    if (P.hp > 0) { P.gold += 200; P.log.push('魔龙被击败！获得200金币'); }
    return;
  }
  if (P.floor === 99) {
    var qs = [
      {q: '什么东西越洗越脏？', a: '水'},
      {q: '什么东西打破了所有人都叫好？', a: '记录'},
      {q: '什么东西借了不用还？', a: '光'}
    ];
    P.riddle = pick(qs);
    P.showingRiddle = true;
    P.log = ['第99层：知识恶魔——"回答我：' + P.riddle.q + '"'];
    return;
  }
  if (P.floor === 100) {
    P.fakeEndChoices = [
      {label: 'A. "我已胜利！"', result: 'death', msg: '魔王大笑着将你碾碎...你死了。'},
      {label: 'B. "这不是终点。"', result: 'continue', msg: '魔王的面具碎裂，露出了通往101层的阶梯...'}
    ];
    P.showingFakeEnd = true;
    P.log = ['第100层：魔王端坐在王座上——"你已到达塔顶，如何选择？"'];
    return;
  }
  if (P.floor === 101) {
    P.log = ['第101层——虚空之主在黑暗中等待...'];
    P.log = P.log.concat(fight({name:'真·魔王·虚空之主', hp:70, atk:20, gold:500}));
    if (P.hp > 0) { P.gold += 500; P.log.push('你成为了新的传说！'); }
    return;
  }
}

// ─── 商店/迷宫/谜题/假结局 ───
function buyShop(i) {
  var item = P.shopItems[i];
  if (!item || P.gold < item.cost) return;
  P.gold -= item.cost;
  if (item.effect === 'heal') P.hp = Math.min(P.maxHp, P.hp + (3 + Math.floor(P.floor/10)*2));
  if (item.effect === 'atk') P.atk += (1 + Math.floor(P.floor/10));
  if (item.effect === 'maxHp') P.maxHp += (2 + Math.floor(P.floor/10)*2);
  P.showingShop = false;
  P.floor++;
  render();
}
function doMaze(i) {
  var c = P.mazeChoices[i];
  P.log = [c.msg];
  if (c.dmg) { P.hp -= c.dmg; P.log.push('受到' + c.dmg + '点伤害'); }
  P.showingMaze = false;
  P.floor++;
  render();
}
function doRiddle() {
  var inp = $('riddle-in');
  var ans = inp ? inp.value.trim() : '';
  if (ans === P.riddle.a) {
    P.log = ['知识恶魔点了点头——"你通过了。"'];
    P.atk += 3; P.hp += 5;
    P.log.push('获得：攻击+3，生命+5');
  } else {
    P.log = ['知识恶魔摇了摇头——"愚蠢。"'];
    P.hp -= 5;
    P.log.push('受到5点伤害');
  }
  P.showingRiddle = false;
  P.floor++;
  render();
}
function doFakeEnd(i) {
  var c = P.fakeEndChoices[i];
  P.log = [c.msg];
  if (c.result === 'death') { P.hp = 0; }
  else { P.floor = 101; }
  P.showingFakeEnd = false;
  render();
}

// ─── 开始游戏 ───
function startGame() {
  P.floor = 1; P.hp = 5; P.maxHp = 5; P.atk = 1; P.gold = 0;
  P.treasures = []; P.log = ['你踏入了百层塔...'];
  P.towerOutside = false; P.outsideSteps = 0; P.outsideMax = 0;
  P.showingShop = false; P.showingMaze = false; P.showingRiddle = false; P.showingFakeEnd = false;
  P.deaths = 0; P.weather = '晴朗';
  render();
}

// 页面加载
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() { startGame(); });
} else {
  startGame();
}
console.log('[百层塔 v3.0] 完整版加载完成——一场景四应对 + 70小怪 + 10事件模板');

</script>
