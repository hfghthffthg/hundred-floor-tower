<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0f;
  color: #d4c8a0;
  font-family: "Microsoft YaHei", sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-image: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a0f 70%);
}
#app {
  width: 100%;
  max-width: 520px;
  min-height: 100vh;
  padding: 20px;
  display: flex;
  flex-direction: column;
}
/* 顶部状态栏 */
#status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111122;
  border: 1px solid #2a2a3a;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 12px;
  font-size: 14px;
}
.stat { display:flex; align-items:center; gap:6px; }
.stat-icon { font-size:18px; }
.stat-val { color:#f0c060; font-weight:bold; }
/* 楼层显示 */
#floor-display {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: #f0c060;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(240,192,96,0.4);
}
#floor-name {
  text-align: center;
  font-size: 13px;
  color: #887744;
  margin-bottom: 16px;
}
/* 主内容区 */
#main-area {
  flex: 1;
  background: #111122;
  border: 1px solid #2a2a3a;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 12px;
  overflow-y: auto;
  max-height: 400px;
}
#narrative {
  font-size: 15px;
  line-height: 1.8;
  color: #c8b888;
  white-space: pre-wrap;
}
/* 选项区 */
#choices {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}
.choice-btn {
  background: #1a1a2e;
  border: 1px solid #3a3a4a;
  border-radius: 8px;
  padding: 14px 16px;
  color: #c8b888;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
}
.choice-btn:hover {
  background: #222244;
  border-color: #f0c060;
  color: #f0c060;
  transform: translateX(4px);
}
.choice-btn:active { transform: scale(0.98); }
.choice-btn .choice-label {
  display: inline-block;
  width: 24px;
  height: 24px;
  line-height: 24px;
  text-align: center;
  background: #f0c060;
  color: #0a0a0f;
  border-radius: 50%;
  font-weight: bold;
  margin-right: 10px;
  font-size: 12px;
}
/* 底部信息 */
#bottom-bar {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #665533;
}
/* 特效 */
.flash { animation: flash 0.5s; }
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.3} }
.shake { animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.golden { color:#f0c060; text-shadow:0 0 10px rgba(240,192,96,0.5); }
.red { color:#ff5555; }
.green { color:#55ff55; }
.blue { color:#5599ff; }
</style>

function getScene() {
  var idx = (P.floor - 1) % SCENES.length;
  var tierStart = P.floor < 20 ? 0 : P.floor < 40 ? 58 : P.floor < 60 ? 116 : P.floor < 90 ? 174 : 232;
  var offset = idx % 58;
  if (P.floor >= 100) return SCENES[tierStart + (idx % 58)];
  return SCENES[tierStart + offset];
}

function fight(m) {
  var log = [], mhp = m.hp, round = 0;
  while (mhp > 0 && P.hp > 0) {
    round++;
    mhp -= P.atk;
    log.push('第'+round+'回合：你对'+m.name+'造成'+P.atk+'点伤害');
    if (mhp <= 0) { P.gold += m.gold; log.push(m.name+'被击败！获得'+m.gold+'金币'); break; }
    P.hp -= m.atk;
    log.push(m.name+'对你造成'+m.atk+'点伤害');
    if (P.hp <= 0) { log.push('你倒下了...'); break; }
  }
  return log;
}

function doAction(c) {
  P.log = [];
  var label = c.label.split('-')[1] || c.label;
  P.log.push(label+'：'+c.desc);
  switch(c.type) {
    case 'battle': var m = getMon(); P.log = P.log.concat(fight(m)); break;
    case 'dodge': if(Math.random()<0.7) P.log.push('成功绕了过去！'); else { var m=getMon(); P.log= P.log.concat(fight(m)); } break;
    case 'gold': var g=rnd(5+P.floor,20+P.floor*2); P.gold+=g; P.log.push('获得'+g+'金币！'); break;
    case 'treasure': var g=rnd(10+P.floor,30+P.floor*2); P.gold+=g; P.log.push('发现宝物！获得'+g+'金币！'); break;
    case 'heal': var h=rnd(2,5+Math.floor(P.floor/10)); P.hp=Math.min(P.maxHp,P.hp+h); P.log.push('恢复了'+h+'点生命！'); break;
    case 'bless': if(Math.random()>0.5){P.atk+=1;P.log.push('获得祝福！攻击+1');}else{P.hp+=2;P.log.push('获得祝福！生命+2');} break;
    case 'intimidate': if(Math.random()<0.6) P.log.push('成功吓退了敌人！'); else { var m=getMon(); P.log=P.log.concat(fight(m)); } break;
    case 'altar': P.gold-=3; if(P.gold<0)P.gold=0; P.atk+=1; P.log.push('祭坛赐予力量...攻击+1！'); break;
    case 'card': if(Math.random()>0.5){P.atk+=2;P.log.push('命运正位：攻击+2！');}else{P.hp-=1;P.log.push('命运逆位：生命-1');} break;
    case 'safe': P.log.push('安全通过...'); break;
    case 'nothing': P.log.push('继续前进...'); break;
  }
  checkSpecial();
  if(P.showingMaze||P.showingRiddle||P.showingFakeEnd){render();return;}
  P.floor++;
  if(P.hp<=0)P.deaths++;
  render();
}

function checkSpecial() {
  if(P.floor===25||P.floor===50||P.floor===75) {
    var bosses={25:[{name:'石像鬼领主',hp:12,atk:5,gold:50}],50:[{name:'炎魔',hp:22,atk:8,gold:80}],75:[{name:'虚空之龙',hp:35,atk:12,gold:120}]};
    var b=pick(bosses[P.floor]);
    P.log=['第'+P.floor+'层——BOSS战！'+b.name+'出现了！'];
    P.log=P.log.concat(fight(b));
    if(P.hp>0){P.gold+=b.gold;P.log.push(b.name+'被击败！获得'+b.gold+'金币');}
  }
  if(P.floor===98){P.log=['魔龙·焚世者！'];P.log=P.log.concat(fight({name:'魔龙·焚世者',hp:45,atk:15,gold:200}));if(P.hp>0)P.gold+=200;}
  if(P.floor===101){P.log=['虚空之主！'];P.log=P.log.concat(fight({name:'真·魔王·虚空之主',hp:70,atk:20,gold:500}));if(P.hp>0)P.gold+=500;}
}

function render() {
  var h=$('hp'),a=$('atk'),g=$('gold'),f=$('floor-display'),nar=$('narrative'),ch=$('choices');
  if(!h||!a||!g||!f||!nar||!ch)return;
  h.textContent=P.hp+'/'+P.maxHp;a.textContent=P.atk;g.textContent=P.gold;
  f.textContent='第 '+P.floor+' 层';
  if(P.hp<=0){nar.textContent='你倒在了第'+P.floor+'层...\n死亡次数：'+(P.deaths+1);ch.innerHTML='<button class="choice-btn" onclick="startGame()"><span class="choice-label">R</span>重新挑战</button>';return;}
  if(P.floor>101){nar.textContent='你击败了虚空之主！塔崩毁了...你成为了新的传说。';ch.innerHTML='<button class="choice-btn" onclick="startGame()"><span class="choice-label">R</span>再玩一次</button>';return;}
  var scene=getScene();
  P.eventsStore=scene;
  nar.textContent='第'+P.floor+'层：'+scene.scene;
  ch.innerHTML='';
  for(var i=0;i<scene.choices.length;i++) {
    var btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML='<span class="choice-label">'+String.fromCharCode(65+i)+'</span>'+scene.choices[i].desc;
    btn.onclick=(function(idx){return function(){doAction(P.eventsStore.choices[idx]);};})(i);
    ch.appendChild(btn);
  }
}

function startGame() {
  P.floor=1;P.hp=5;P.maxHp=5;P.atk=1;P.gold=0;
  P.treasures=[];P.log=['你踏入了百层塔...'];
  P.towerOutside=false;P.showingShop=false;P.showingMaze=false;P.showingRiddle=false;P.showingFakeEnd=false;
  P.deaths=0;
  render();
}

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',function(){startGame();});}else{startGame();}
console.log('[百层塔 v3.1] 290独立场景 + 70小怪 + 难度分级加载完成');
