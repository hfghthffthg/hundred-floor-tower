<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百层塔 · 月影出品</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0f;
  color: #d4c8a0;
  font-family: "Microsoft YaHei", sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-image: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a0f 70%);
}
#app {
  width: 100%;
  max-width: 520px;
  min-height: 100vh;
  padding: 20px;
  display: flex;
  flex-direction: column;
}
/* 顶部状态栏 */
#status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111122;
  border: 1px solid #2a2a3a;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 12px;
  font-size: 14px;
}
.stat { display:flex; align-items:center; gap:6px; }
.stat-icon { font-size:18px; }
.stat-val { color:#f0c060; font-weight:bold; }
/* 楼层显示 */
#floor-display {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: #f0c060;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(240,192,96,0.4);
}
#floor-name {
  text-align: center;
  font-size: 13px;
  color: #887744;
  margin-bottom: 16px;
}
/* 主内容区 */
#main-area {
  flex: 1;
  background: #111122;
  border: 1px solid #2a2a3a;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 12px;
  overflow-y: auto;
  max-height: 400px;
}
#narrative {
  font-size: 15px;
  line-height: 1.8;
  color: #c8b888;
  white-space: pre-wrap;
}
/* 选项区 */
#choices {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}
.choice-btn {
  background: #1a1a2e;
  border: 1px solid #3a3a4a;
  border-radius: 8px;
  padding: 14px 16px;
  color: #c8b888;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
}
.choice-btn:hover {
  background: #222244;
  border-color: #f0c060;
  color: #f0c060;
  transform: translateX(4px);
}
.choice-btn:active { transform: scale(0.98); }
.choice-btn .choice-label {
  display: inline-block;
  width: 24px;
  height: 24px;
  line-height: 24px;
  text-align: center;
  background: #f0c060;
  color: #0a0a0f;
  border-radius: 50%;
  font-weight: bold;
  margin-right: 10px;
  font-size: 12px;
}
/* 底部信息 */
#bottom-bar {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #665533;
}
/* 特效 */
.flash { animation: flash 0.5s; }
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.3} }
.shake { animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.golden { color:#f0c060; text-shadow:0 0 10px rgba(240,192,96,0.5); }
.red { color:#ff5555; }
.green { color:#55ff55; }
.blue { color:#5599ff; }
</style>
</head>
<body>
<div id="app">
  <div id="status-bar">
    <div class="stat"><span class="stat-icon">❤️</span><span class="stat-val" id="hp">5</span></div>
    <div class="stat"><span class="stat-icon">⚔️</span><span class="stat-val" id="atk">1</span></div>
    <div class="stat"><span class="stat-icon">🪙</span><span class="stat-val" id="gold">0</span></div>
    <div class="stat"><span class="stat-icon">✨</span><span class="stat-val" id="bless">无</span></div>
    <div class="stat"><span class="stat-icon">💀</span><span class="stat-val" id="curse">无</span></div>
  </div>
  <div id="floor-display">第 1 层</div>
  <div id="floor-name"></div>
  <div id="main-area">
    <div id="narrative">欢迎来到百层塔——点击下方按钮开始爬塔！</div>
  </div>
  <div id="choices"></div>
  <div id="choices">
    <button class="choice-btn" style="text-align:center;font-size:18px;border-color:#f0c060;" onclick="if(typeof startNewGame==='function')startNewGame();else location.reload();">
      <span class="choice-label">🏰</span>开始爬塔
    </button>
  </div>
  <div id="bottom-bar">
    <span>百层塔 v1.0</span>
    <span>月影出品 · 月影工作室</span>
  </div>
</div>
<script>
// ═══════════════════════════════════════
// 百层塔 · 肉鸽爬塔网页游戏 v2.0
// 月影工作室出品
// ═══════════════════════════════════════

// ─── 核心状态 ───
var P = {
  choicesStore: [],
  floor: 1, hp: 5, maxHp: 5, atk: 1, gold: 0,
  treasures: [], log: [],
  towerOutside: false, outsideSteps: 0, outsideMax: 0,
  showingShop: false, shopItems: [],
  showingMaze: false, mazeChoices: [],
  showingRiddle: false, riddle: null,
  showingFakeEnd: false, fakeEndChoices: [],
  deaths: 0, weather: '晴朗'
};

// ─── 工具函数 ───
function $(id) { return document.getElementById(id); }
function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ─── 渲染 ───
function render() {
  var h = $('hp'), a = $('atk'), g = $('gold'), f = $('floor-display'), fn = $('floor-name'), nar = $('narrative'), ch = $('choices');
  if (!h || !a || !g || !f || !fn || !nar || !ch) return;
  h.textContent = P.hp + '/' + P.maxHp;
  a.textContent = P.atk;
  g.textContent = P.gold;
  
  if (P.towerOutside) { f.textContent = '塔外 · ???'; fn.textContent = ''; }
  else { f.textContent = '第 ' + P.floor + ' 层'; fn.textContent = ''; }
  
  // 显示日志
  var txt = P.log.length > 0 ? P.log.join('\n') : '第' + P.floor + '层——前方出现了岔路...';
  nar.textContent = txt;
  
  // 死亡检查
  if (P.hp <= 0) {
    nar.textContent = '你倒在了第' + P.floor + '层...死亡次数：' + (P.deaths + 1);
    ch.innerHTML = '<button class="choice-btn" onclick="startGame()"><span class="choice-label">R</span>重新挑战</button>';
    return;
  }
  
  // 胜利
  if (P.floor > 101) {
    nar.textContent = '你击败了虚空之主！塔崩毁了...你成为了新的传说。';
    ch.innerHTML = '<button class="choice-btn" onclick="startGame()"><span class="choice-label">R</span>再玩一次</button>';
    return;
  }
  
  // 特殊界面：商店
  if (P.showingShop) {
    var htm = '<div style="margin-bottom:8px;color:#f0c060;">流浪商人的商品：</div>';
    for (var i = 0; i < P.shopItems.length; i++) {
      var item = P.shopItems[i];
      htm += '<button class="choice-btn" onclick="buyShop(' + i + ')"><span class="choice-label">' + String.fromCharCode(65+i) + '</span>' + item.name + ' - ' + item.desc + '（' + item.cost + '金币）</button>';
    }
    htm += '<button class="choice-btn" onclick="P.showingShop=false; P.floor++; render();"><span class="choice-label">X</span>离开商店</button>';
    ch.innerHTML = htm;
    return;
  }
  
  // 特殊界面：迷宫
  if (P.showingMaze) {
    var htm = '';
    for (var i = 0; i < P.mazeChoices.length; i++) {
      htm += '<button class="choice-btn" onclick="doMaze(' + i + ')"><span class="choice-label">' + String.fromCharCode(65+i) + '</span>' + P.mazeChoices[i].text + '</button>';
    }
    ch.innerHTML = htm;
    return;
  }
  
  // 特殊界面：谜题
  if (P.showingRiddle) {
    ch.innerHTML = '<input id="riddle-in" type="text" placeholder="输入你的答案..." style="width:100%;padding:12px;background:#1a1a2e;border:1px solid #3a3a4a;border-radius:8px;color:#c8b888;font-size:14px;margin-bottom:8px;"><button class="choice-btn" onclick="doRiddle()"><span class="choice-label">OK</span>提交答案</button>';
    return;
  }
  
  // 特殊界面：假结局
  if (P.showingFakeEnd) {
    var htm = '';
    for (var i = 0; i < P.fakeEndChoices.length; i++) {
      htm += '<button class="choice-btn" onclick="doFakeEnd(' + i + ')"><span class="choice-label">' + String.fromCharCode(65+i) + '</span>' + P.fakeEndChoices[i].label + '</button>';
    }
    ch.innerHTML = htm;
    return;
  }
  
  // 正常楼层——从事件池生成选项
  var events = getEvents();
  P.choicesStore = events;
  ch.innerHTML = '';
  for (var i = 0; i < events.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = '<span class="choice-label">' + String.fromCharCode(65+i) + '</span>' + events[i].label;
    btn.onclick = (function(idx) { return function() { doEvent(P.choicesStore[idx]); }; })(i);
    ch.appendChild(btn);
  }
}

// ─── 事件池 ───
var EVENTS_BY_TIER = {
  tier1: [
    {label: '一只骷髅兵拦住了去路！', type: 'monster'},
    {label: '你发现了一个破旧的宝箱', type: 'treasure'},
    {label: '地上散落着几枚金币', type: 'gold'},
    {label: '你找到了一小瓶恢复药水', type: 'heal'},
    {label: '触发了一个毒箭陷阱！', type: 'trap'},
    {label: '这层空空荡荡，什么也没有', type: 'nothing'},
    {label: '一座古老的祭坛散发着微光', type: 'altar'},
    {label: '一张命运卡牌悬浮在空中', type: 'card'},
    {label: '角落里藏着一个木箱', type: 'treasure'},
    {label: '你在墙缝里发现了一些金币', type: 'gold'},
  ],
  tier2: [
    {label: '石像鬼发出一声嘶吼冲了过来！', type: 'monster'},
    {label: '一个银色的宝箱被锁链缠绕', type: 'treasure'},
    {label: '一堆金币散落在角落', type: 'gold'},
    {label: '一瓶泛着荧光的恢复药', type: 'heal'},
    {label: '地面突然塌陷！', type: 'trap'},
    {label: '一个流浪商人在这里歇脚', type: 'shop'},
    {label: '滚石从上方砸下！', type: 'trap'},
    {label: '一座远古祭坛浮现出来', type: 'altar'},
    {label: '命运卡牌翻转在空中', type: 'card'},
    {label: '墙上的暗格里塞着一个宝箱', type: 'treasure'},
  ],
  tier3: [
    {label: '怨灵从阴影中缓缓现身', type: 'monster'},
    {label: '黄金宝箱散发着诱人的光芒', type: 'treasure'},
    {label: '成堆的金币铺满地面', type: 'gold'},
    {label: '一瓶强效恢复药剂', type: 'heal'},
    {label: '魔法符文闪烁！', type: 'trap'},
    {label: '一个神秘商人向你招呼', type: 'shop'},
    {label: '黑暗能量吞噬了你', type: 'trap'},
    {label: '一座被诅咒的祭坛', type: 'altar'},
    {label: '命运之轮在转动', type: 'card'},
    {label: '墙壁上有一道暗门...', type: 'hidden'},
  ],
  tier4: [
    {label: '奇美拉从虚空中撕裂而出！', type: 'monster'},
    {label: '传说级的宝箱被藤蔓包裹', type: 'treasure'},
    {label: '一座小金山！', type: 'gold'},
    {label: '一瓶散发着金光的圣药', type: 'heal'},
    {label: '时空裂缝在身边裂开！', type: 'trap'},
    {label: '一个半透明的商人凭空出现', type: 'shop'},
    {label: '深渊的低语撕扯灵魂', type: 'trap'},
    {label: '一座散发着邪气的祭坛', type: 'altar'},
    {label: '命运在此刻凝结', type: 'card'},
    {label: '空气中有一道裂缝...', type: 'hidden'},
  ],
  tier5: [
    {label: '骨龙幼崽——深渊的守卫出现了！', type: 'monster'},
    {label: '神话级宝箱在黑暗中发光', type: 'treasure'},
    {label: '满地都是闪闪发光的金币', type: 'gold'},
    {label: '远古神殿的圣水', type: 'heal'},
    {label: '空间崩坏！', type: 'trap'},
    {label: '因果律武器启动！', type: 'trap'},
    {label: '绝对的虚无笼罩着你', type: 'nothing'},
    {label: '黑暗祭坛呼唤着你', type: 'altar'},
    {label: '命运在此交错', type: 'card'},
    {label: '空间扭曲中藏着一道门...', type: 'hidden'},
  ]
};

function getEvents() {
  var tierKey = P.floor < 20 ? 'tier1' : P.floor < 40 ? 'tier2' : P.floor < 60 ? 'tier3' : P.floor < 90 ? 'tier4' : 'tier5';
  var pool = EVENTS_BY_TIER[tierKey];
  // 随机打乱取4个
  var shuffled = [];
  var copy = pool.slice();
  while (shuffled.length < 4 && copy.length > 0) {
    var idx = Math.floor(Math.random() * copy.length);
    shuffled.push(copy[idx]);
    copy.splice(idx, 1);
  }
  return shuffled;
}

// ─── 选项处理 ───
function doEvent(e) {
  P.log = [];
  switch(e.type) {
    case 'monster':
      var m = getMon();
      P.log = fight(m);
      break;
    case 'treasure':
      var g = rnd(10 + P.floor, 30 + P.floor*2);
      P.gold += g;
      P.log = ['打开宝箱，获得了' + g + '金币！'];
      break;
    case 'gold':
      var g = rnd(5 + P.floor, 20 + P.floor*2);
      P.gold += g;
      P.log = ['获得了' + g + '金币！'];
      break;
    case 'heal':
      var h = rnd(2, 5 + Math.floor(P.floor/10));
      P.hp = Math.min(P.maxHp, P.hp + h);
      P.log = ['恢复了' + h + '点生命！'];
      break;
    case 'trap':
      var d = rnd(2, 6 + Math.floor(P.floor/10));
      P.hp -= d;
      P.log = ['陷阱！受到' + d + '点伤害'];
      break;
    case 'nothing':
      P.log = ['这里什么都没有...'];
      break;
    case 'altar':
      P.log = ['祭坛的力量涌入了你的身体...攻击+1！'];
      P.atk += 1;
      break;
    case 'card':
      var roll = Math.random();
      if (roll > 0.5) { P.atk += 2; P.log = ['命运卡牌正位：攻击+2！']; }
      else { P.hp -= 1; P.log = ['命运卡牌逆位：生命-1']; }
      break;
    case 'shop':
      var tier = P.floor < 30 ? 1 : P.floor < 60 ? 2 : P.floor < 90 ? 3 : 4;
      P.shopItems = [
        {name: '生命药水', cost: 10 + tier*5, desc: '恢复' + (3+tier*2) + '生命', effect: 'heal'},
        {name: '攻击卷轴', cost: 15 + tier*5, desc: '攻击+' + (1+tier), effect: 'atk'},
        {name: '护盾符文', cost: 12 + tier*5, desc: '生命上限+' + (2+tier*2), effect: 'maxHp'}
      ];
      P.showingShop = true;
      render();
      return;
    case 'hidden':
      var hr = Math.random();
      if (hr < 0.5) { P.gold += 30; P.log = ['隐藏房间里堆满了金币！']; }
      else if (hr < 0.8) { P.atk += 2; P.log = ['隐藏的力量强化了你的攻击！攻击+2']; }
      else { P.hp += 5; P.log = ['隐藏的圣光治愈了你！生命+5']; }
      break;
    default:
      P.log = ['一个未知的事件...'];
  }

  // 检查特殊楼层
  checkSpecial();
  if (P.showingMaze || P.showingRiddle || P.showingFakeEnd) { render(); return; }

  P.floor++;
  if (P.hp <= 0) { P.deaths++; }
  render();
}

// ─── 旧doChoice保留兼容 ───
function doChoice(c) { doEvent(c); }

function getMon() {
  var mons = [
    {name:'骷髅兵', hp:2, atk:1, gold:8},
    {name:'史莱姆', hp:1, atk:1, gold:5},
    {name:'哥布林', hp:2, atk:2, gold:10},
    {name:'幽灵', hp:2, atk:1, gold:6},
    {name:'石像鬼', hp:3, atk:2, gold:12},
    {name:'火焰精灵', hp:2, atk:3, gold:15},
    {name:'暗影触手', hp:2, atk:2, gold:10},
    {name:'毒蝎', hp:2, atk:2, gold:10},
    {name:'岩石魔像', hp:4, atk:2, gold:14},
    {name:'怨灵', hp:3, atk:3, gold:13},
    {name:'奇美拉', hp:6, atk:4, gold:22},
    {name:'雷鸟', hp:5, atk:5, gold:25},
    {name:'暗影主教', hp:6, atk:5, gold:26},
    {name:'冰封巨人', hp:8, atk:5, gold:30},
    {name:'骨龙幼崽', hp:10, atk:6, gold:35}
  ];
  var tier = P.floor < 20 ? 0 : P.floor < 40 ? 3 : P.floor < 60 ? 6 : P.floor < 90 ? 10 : 12;
  return pick(mons.slice(tier, Math.min(tier + 5, mons.length)));
}

// ─── 战斗 ───
function fight(m) {
  var log = [], mhp = m.hp, round = 0;
  while (mhp > 0 && P.hp > 0) {
    round++;
    mhp -= P.atk;
    log.push('第' + round + '回合：你对' + m.name + '造成' + P.atk + '点伤害');
    if (mhp <= 0) { P.gold += m.gold; log.push(m.name + '被击败！获得' + m.gold + '金币'); break; }
    P.hp -= m.atk;
    log.push(m.name + '对你造成' + m.atk + '点伤害');
    if (P.hp <= 0) { log.push('你倒下了...'); break; }
  }
  return log;
}

// ─── 特殊楼层 ───
function checkSpecial() {
  if (P.floor === 25 || P.floor === 50 || P.floor === 75) {
    var bosses = {
      25: [{name:'石像鬼领主', hp:15, atk:6, gold:50}],
      50: [{name:'炎魔', hp:25, atk:10, gold:80}],
      75: [{name:'虚空之龙', hp:40, atk:15, gold:120}]
    };
    var b = pick(bosses[P.floor]);
    P.log = ['第' + P.floor + '层——BOSS战！' + b.name + '出现了！'];
    P.log = P.log.concat(fight(b));
    if (P.hp > 0) { P.gold += b.gold; P.log.push(b.name + '被击败！获得' + b.gold + '金币'); }
    return;
  }
  if (P.floor === 96) {
    P.mazeChoices = [
      {text: 'A. 左转', result: 'correct', msg: '你找到了正确的路！'},
      {text: 'B. 右转', result: 'wrong', msg: '你绕回了原地', dmg: 2},
      {text: 'C. 直走', result: 'wrong', msg: '陷阱！尖刺弹出', dmg: 3},
      {text: 'D. 回头', result: 'wrong', msg: '撞上了墙', dmg: 1}
    ];
    P.showingMaze = true;
    P.log = ['第96层：无尽迷宫——选择方向...'];
    return;
  }
  if (P.floor === 97) {
    var d = rnd(5, 10);
    P.hp -= d;
    P.log = ['第97层：死亡机关——滚石、毒箭、地刺同时启动！受到' + d + '点伤害'];
    return;
  }
  if (P.floor === 98) {
    P.log = ['第98层——魔龙·焚世者盘踞于此！'];
    P.log = P.log.concat(fight({name:'魔龙·焚世者', hp:50, atk:18, gold:200}));
    if (P.hp > 0) { P.gold += 200; P.log.push('魔龙被击败！获得200金币'); }
    return;
  }
  if (P.floor === 99) {
    var qs = [
      {q: '什么东西越洗越脏？', a: '水'},
      {q: '什么东西打破了所有人都叫好？', a: '记录'},
      {q: '什么东西借了不用还？', a: '光'}
    ];
    P.riddle = pick(qs);
    P.showingRiddle = true;
    P.log = ['第99层：知识恶魔——"回答我：' + P.riddle.q + '"'];
    return;
  }
  if (P.floor === 100) {
    P.fakeEndChoices = [
      {label: 'A. "我已胜利！"', result: 'death', msg: '魔王大笑着将你碾碎...你死了。'},
      {label: 'B. "这不是终点。"', result: 'continue', msg: '魔王的面具碎裂，露出了通往101层的阶梯...'}
    ];
    P.showingFakeEnd = true;
    P.log = ['第100层：魔王端坐在王座上——"你已到达塔顶，如何选择？"'];
    return;
  }
  if (P.floor === 101) {
    P.log = ['第101层——虚空之主在黑暗中等待...这是真正的最终之战！'];
    P.log = P.log.concat(fight({name:'真·魔王·虚空之主', hp:80, atk:25, gold:500}));
    if (P.hp > 0) { P.gold += 500; P.log.push('虚空之主被击败！你成为了新的传说！'); }
    return;
  }
}

// ─── 商店购买 ───
function buyShop(i) {
  var item = P.shopItems[i];
  if (!item || P.gold < item.cost) return;
  P.gold -= item.cost;
  if (item.effect === 'heal') P.hp = Math.min(P.maxHp, P.hp + (3 + Math.floor(P.floor/10)*2));
  if (item.effect === 'atk') P.atk += (1 + Math.floor(P.floor/10));
  if (item.effect === 'maxHp') P.maxHp += (2 + Math.floor(P.floor/10)*2);
  P.showingShop = false;
  P.floor++;
  render();
}

// ─── 迷宫 ───
function doMaze(i) {
  var c = P.mazeChoices[i];
  P.log = [c.msg];
  if (c.dmg) { P.hp -= c.dmg; P.log.push('受到' + c.dmg + '点伤害'); }
  P.showingMaze = false;
  P.floor++;
  render();
}

// ─── 谜题 ───
function doRiddle() {
  var inp = $('riddle-in');
  var ans = inp ? inp.value.trim() : '';
  if (ans === P.riddle.a) {
    P.log = ['知识恶魔点了点头——"你通过了。"'];
    P.atk += 3; P.hp += 5;
    P.log.push('获得：攻击+3，生命+5');
  } else {
    P.log = ['知识恶魔摇了摇头——"愚蠢。"'];
    P.hp -= 5;
    P.log.push('受到5点伤害');
  }
  P.showingRiddle = false;
  P.floor++;
  render();
}

// ─── 假结局 ───
function doFakeEnd(i) {
  var c = P.fakeEndChoices[i];
  P.log = [c.msg];
  if (c.result === 'death') { P.hp = 0; }
  else { P.floor = 101; }
  P.showingFakeEnd = false;
  render();
}

// ─── 开始游戏 ───
function startGame() {
  P.floor = 1; P.hp = 5; P.maxHp = 5; P.atk = 1; P.gold = 0;
  P.treasures = []; P.log = ['你踏入了百层塔...'];
  P.towerOutside = false; P.outsideSteps = 0; P.outsideMax = 0;
  P.showingShop = false; P.showingMaze = false; P.showingRiddle = false; P.showingFakeEnd = false;
  P.deaths = 0; P.weather = '晴朗';
  render();
}

// ─── 页面加载 ───
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() { startGame(); });
} else {
  startGame();
}

console.log('[百层塔 v2.0] 极简架构加载完成');

</script>
