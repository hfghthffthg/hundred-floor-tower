<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百层塔 · 月影出品</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0f;
  color: #d4c8a0;
  font-family: "Microsoft YaHei", sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-image: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a0f 70%);
}
#app {
  width: 100%;
  max-width: 520px;
  min-height: 100vh;
  padding: 20px;
  display: flex;
  flex-direction: column;
}
/* 顶部状态栏 */
#status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111122;
  border: 1px solid #2a2a3a;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 12px;
  font-size: 14px;
}
.stat { display:flex; align-items:center; gap:6px; }
.stat-icon { font-size:18px; }
.stat-val { color:#f0c060; font-weight:bold; }
/* 楼层显示 */
#floor-display {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: #f0c060;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(240,192,96,0.4);
}
#floor-name {
  text-align: center;
  font-size: 13px;
  color: #887744;
  margin-bottom: 16px;
}
/* 主内容区 */
#main-area {
  flex: 1;
  background: #111122;
  border: 1px solid #2a2a3a;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 12px;
  overflow-y: auto;
  max-height: 400px;
}
#narrative {
  font-size: 15px;
  line-height: 1.8;
  color: #c8b888;
  white-space: pre-wrap;
}
/* 选项区 */
#choices {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}
.choice-btn {
  background: #1a1a2e;
  border: 1px solid #3a3a4a;
  border-radius: 8px;
  padding: 14px 16px;
  color: #c8b888;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
}
.choice-btn:hover {
  background: #222244;
  border-color: #f0c060;
  color: #f0c060;
  transform: translateX(4px);
}
.choice-btn:active { transform: scale(0.98); }
.choice-btn .choice-label {
  display: inline-block;
  width: 24px;
  height: 24px;
  line-height: 24px;
  text-align: center;
  background: #f0c060;
  color: #0a0a0f;
  border-radius: 50%;
  font-weight: bold;
  margin-right: 10px;
  font-size: 12px;
}
/* 底部信息 */
#bottom-bar {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #665533;
}
/* 特效 */
.flash { animation: flash 0.5s; }
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.3} }
.shake { animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.golden { color:#f0c060; text-shadow:0 0 10px rgba(240,192,96,0.5); }
.red { color:#ff5555; }
.green { color:#55ff55; }
.blue { color:#5599ff; }
</style>
</head>
<body>
<div id="app">
  <div id="status-bar">
    <div class="stat"><span class="stat-icon">❤️</span><span class="stat-val" id="hp">5</span></div>
    <div class="stat"><span class="stat-icon">⚔️</span><span class="stat-val" id="atk">1</span></div>
    <div class="stat"><span class="stat-icon">🪙</span><span class="stat-val" id="gold">0</span></div>
    <div class="stat"><span class="stat-icon">✨</span><span class="stat-val" id="bless">无</span></div>
    <div class="stat"><span class="stat-icon">💀</span><span class="stat-val" id="curse">无</span></div>
  </div>
  <div id="floor-display">第 1 层</div>
  <div id="floor-name"></div>
  <div id="main-area">
    <div id="narrative">欢迎来到百层塔……</div>
  </div>
  <div id="choices"></div>
  <div id="bottom-bar">
    <span>百层塔 v1.0</span>
    <span>月影出品 · 月影工作室</span>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
